<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pladurcuter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header no-print">
    <span class="app-logo">▦</span>
    <div>
      <span class="app-title">Pladurcuter</span>
      <span class="app-sub">Optimizador de cortes · tableros 1.200 × 2.800 mm</span>
    </div>
  </header>

  <main>

    <!-- ── UPLOAD ── -->
    <section id="upload-section">
      <div class="upload-card">

        <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
             aria-label="Zona de carga: arrastra un archivo CSV o PDF">
          <input type="file" id="file-input" accept=".csv,.pdf,.txt" class="hidden"
                 aria-label="Seleccionar archivo">
          <div class="drop-icon">⊞</div>
          <p class="drop-title">Arrastra el archivo aquí</p>
          <p class="drop-hint">CSV o PDF &nbsp;·&nbsp; Longitud y Altura en mm</p>
        </div>

        <div id="file-selected" class="file-badge hidden">
          <span id="file-name-display"></span>
          <button id="btn-clear-file" class="file-badge-close" aria-label="Quitar archivo">✕</button>
        </div>

        <div id="upload-error" class="upload-error hidden"></div>

        <button id="btn-optimize" class="btn-primary" disabled>
          <span id="btn-text">Procesar</span>
          <span id="btn-spinner" class="spinner hidden" aria-hidden="true"></span>
        </button>

      </div>

      <div class="legend no-print">
        <span class="li"><span class="lc" style="background:#BFDBFE"></span>TRX E</span>
        <span class="li"><span class="lc" style="background:#93C5FD"></span>TRX EE</span>
        <span class="li"><span class="lc" style="background:#60A5FA"></span>TRX H</span>
        <span class="li"><span class="lc" style="background:#3B82F6"></span>TRX EH</span>
        <span class="li"><span class="lc" style="background:#BBF7D0"></span>TBX E</span>
        <span class="li"><span class="lc" style="background:#86EFAC"></span>TBX EE</span>
        <span class="li"><span class="lc" style="background:#4ADE80"></span>TBX H</span>
        <span class="li"><span class="lc" style="background:#22C55E"></span>TBX EH</span>
        <span class="li"><span class="lc waste-swatch"></span>Desperdicio</span>
      </div>
    </section>

    <!-- ── RESULTS ── -->
    <section id="results-section" class="hidden">

      <!-- Print header (only visible when printing) -->
      <div class="print-only print-header">
        <strong>Plan de Corte · Pladurcuter</strong>
        <span id="print-date"></span>
      </div>

      <!-- Screen toolbar -->
      <div class="toolbar no-print">
        <button id="btn-new" class="btn-ghost" aria-label="Volver a cargar nuevo archivo">← Nueva</button>
        <span id="result-meta" class="result-meta"></span>
        <button id="btn-print" class="btn-primary" aria-label="Imprimir plan de corte">Imprimir</button>
      </div>

      <!-- Parse warnings -->
      <div id="parse-errors-container" class="parse-warnings hidden no-print">
        <strong>Advertencia</strong> — Filas no procesadas:
        <ul id="parse-errors-list"></ul>
      </div>

      <!-- Boards grid -->
      <div id="boards-container"></div>

      <!-- Summary -->
      <div id="summary-section">
        <h2 class="section-title">Resumen</h2>
        <div id="summary-container"></div>
      </div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
